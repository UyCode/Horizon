name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at 00:00 UTC / 08:00 Asia/Shanghai
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Configure email recipients
        env:
          HORIZON_EMAIL_RECIPIENTS: ${{ secrets.HORIZON_EMAIL_RECIPIENTS }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          recipients = [
              item.strip()
              for item in os.environ.get("HORIZON_EMAIL_RECIPIENTS", "").split(",")
              if item.strip()
          ]
          Path("data/subscribers.json").write_text(
              json.dumps(recipients, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run Horizon
        env:
          # Values are configured in this fork's repository secrets/variables.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
          HORIZON_EMAIL_ADDRESS: ${{ secrets.HORIZON_EMAIL_ADDRESS }}
          HORIZON_EMAIL_PASSWORD: ${{ secrets.HORIZON_EMAIL_PASSWORD }}
          HORIZON_SMTP_SERVER: ${{ vars.HORIZON_SMTP_SERVER }}
          HORIZON_SMTP_PORT: ${{ vars.HORIZON_SMTP_PORT }}
          HORIZON_SMTP_USERNAME: ${{ vars.HORIZON_SMTP_USERNAME }}
          HORIZON_EMAIL_SENDER_NAME: ${{ vars.HORIZON_EMAIL_SENDER_NAME }}
        run: uv run horizon --hours 48

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
